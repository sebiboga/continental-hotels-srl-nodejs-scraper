name: Automation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  ensure-company-core:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Ensure CONTINENTAL HOTELS exists in company core
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          if [ -z "${SOLR_AUTH}" ]; then
            echo "⚠️ SOLR_AUTH not set — skipping company core check"
            exit 0
          fi

          EXISTING=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:1559737&rows=1" | jq '.response.numFound')

          echo "CONTINENTAL HOTELS count in company core: $EXISTING"

          if [ "$EXISTING" -eq "0" ]; then
            echo "CONTINENTAL HOTELS not found - adding to company core..."
            echo '[{"id":"1559737","company":"CONTINENTAL HOTELS SA","brand":"CONTINENTAL HOTELS","status":"activ","location":["Bucureşti"],"website":["https://continentalhotels.ro"],"career":["https://www.jobs-continentalhotels.ro"],"lastScraped":"'$(date +%Y-%m-%d)'","scraperFile":"https://raw.githubusercontent.com/sebiboga/continental-hotels-srl-nodejs-scraper/main/.github/workflows/scrape.yml"}]' > company_data.json

            curl -s --user "${SOLR_AUTH}" \
              "https://solr.peviitor.ro/solr/company/update/json?commit=true" \
              -X POST \
              -H "Content-Type: application/json" \
              --data-binary @company_data.json
          else
            echo "CONTINENTAL HOTELS already exists in company core - no action needed"
          fi

          FINAL=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:1559737&rows=1" | jq '.response.numFound')

          echo "CONTINENTAL HOTELS count after check: $FINAL"

          if [ "$FINAL" -ge "1" ]; then
            echo "✅ SUCCESS: CONTINENTAL HOTELS is in company core"
          else
            echo "❌ FAILED: CONTINENTAL HOTELS still not in company core"
            exit 1
          fi

  Automation-Tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: |
          npm run test:unit
          mv test-report.html test-results-unit.html || true
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: test-results-unit.html
          retention-days: 30

      - name: Run Integration Tests
        run: |
          npm run test:integration
          mv test-report.html test-results-integration.html || true
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: test-results-integration.html
          retention-days: 30

      - name: Run E2E Tests
        run: |
          npm run test:e2e
          mv test-report.html test-results-e2e.html || true
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results-e2e.html
          retention-days: 30
